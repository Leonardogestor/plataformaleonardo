name: 🚀 FORÇADO Deploy Produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔥 FORÇADO Checkout
        uses: actions/checkout@v4

      - name: 🔥 FORÇADO Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: 🔥 FORÇADO Install dependencies
        run: npm ci --force

      - name: 🔥 FORÇADO Generate Prisma Client
        run: npx prisma generate

      - name: 🔥 FORÇADO Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🔥 FORÇADO Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod --force"
